name: CI

on:
  repository_dispatch:
    types: [submodule-updated]

jobs:

  # ── check machine is not printing ─────────────────────────────────────────
  check-machine:
    if: github.event.client_payload.ref == 'refs/heads/dev'
    runs-on: [self-hosted, test-server]
    steps:
      - name: Check machine status
        id: check
        run: |
          STATUS=$(curl -s "http://localhost/rr_connect?password=" > /dev/null &&             curl -s "http://localhost/rr_model?key=state.status" |             python3 -c "import sys,json; print(json.load(sys.stdin)['result'])"             2>/dev/null || echo "unknown")
          echo "── Machine status: $STATUS ──"
          if [ "$STATUS" = "processing" ]; then
            echo "── Machine is printing — skipping CI ──"
            echo "busy=true" >> $GITHUB_OUTPUT
          else
            echo "── Machine is idle — proceeding ──"
            echo "busy=false" >> $GITHUB_OUTPUT
          fi

  # ────────────────────────────────────────────────────────────────────────────
  build:
    needs: check-machine
    runs-on: [self-hosted, test-server]

    outputs:
      test_image: ${{ steps.set_image.outputs.test_image }}

    env:
      SUBMODULE: ${{ github.event.client_payload.submodule }}
      SHA:       ${{ github.event.client_payload.sha }}
      PUSHER:    ${{ github.event.client_payload.pusher }}

    steps:

      - name: Clean stale submodule cache
        run: |
          rm -rf /home/pro/O3D_Test_Framework/actions-runner/_work/O3D_Test_Framework/O3D_Test_Framework/.git/modules/OMNI3D_RFID_Middleware/modules
          rm -rf /home/pro/O3D_Test_Framework/actions-runner/_work/O3D_Test_Framework/O3D_Test_Framework/.git/modules/OMNI3D_MMS/modules

      - name: Set image tag
        id: set_image
        run: |
          TAG="omni3d-stack:ci-test-$(date +%Y%m%d-%H%M%S)"
          echo "TEST_IMAGE=$TAG" >> $GITHUB_ENV
          echo "test_image=$TAG" >> $GITHUB_OUTPUT

      # ── S0: check machine is not printing ────────────────────────────────────
      - name: S0 — Check machine is not printing
        run: |
          echo "── Checking machine status ──"
          STATUS=$(curl -s "http://localhost/rr_connect?password=" > /dev/null &&             curl -s "http://localhost/rr_model?key=state.status" | python3 -c "import sys,json; print(json.load(sys.stdin)['result'])" 2>/dev/null || echo "unknown")
          echo "── Machine status: $STATUS ──"
          if [ "$STATUS" = "processing" ]; then
            echo "::error title=Machine Busy::CI cancelled — machine is currently printing. Re-trigger the pipeline when the print is complete."
            echo "── Triggered by: $PUSHER pushing to $SUBMODULE ──"
            exit 1
          fi
          echo "✓ Machine is idle — proceeding"

      # ── S1: checkout all submodules at latest dev ───────────────────────────
      - name: S1 — Checkout all submodules at latest dev
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.OMNI3D_CI }}

      - name: S1 — Update all submodules to latest dev
        run: |
          echo "── Triggered by $PUSHER pushing to $SUBMODULE ──"
          git submodule foreach '
            git fetch --all 2>/dev/null || true
            git checkout origin/dev 2>/dev/null || git checkout dev 2>/dev/null || true
            git pull origin dev 2>/dev/null || true
            echo "── $name: $(git log -1 --oneline) ──"
          '

      # ── S2: unit tests for all services ────────────────────────────────────
      - name: S2 — Unit tests
        run: |
          FAILED=0
          for dir in */; do
            dir="${dir%/}"
            # skip non-directories and omni3d-container
            if [[ "$dir" == "omni3d-container" ]]; then
              continue
            fi
            if [ -d "$dir/tests" ] && [ -f "$dir/pytest.ini" ]; then
              echo "── Testing $dir ──"
              cd "$dir"
              python3 -m pytest tests/ -v || FAILED=1
              cd ..
            else
              echo "── No tests found in $dir — skipping ──"
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "✗ Unit tests failed"
            exit 1
          fi
          echo "✓ All unit tests passed"

      # ── S2.5: generate Dockerfile and supervisord from detected services ────
      - name: S2.5 — Generate Dockerfile and supervisord
        run: |
          echo "── Detecting service submodules ──"
          python3 omni3d-container/scripts/generate_config.py .
          echo "── Generated Dockerfile ──"
          cat omni3d-container/Dockerfile
          echo "── Generated supervisord.conf ──"
          cat omni3d-container/supervisord.conf

      # ── S2.6: clean old ci-test images ──────────────────────────────────────
      - name: S2.6 — Clean old ci-test and dev-release images
        run: |
          # remove old ci-test images
          docker images "omni3d-stack" --format "{{.Tag}}" | grep "ci-test" |             xargs -I{} docker rmi "omni3d-stack:{}" 2>/dev/null || true
          # keep only the 2 most recent dev-release images
          docker images "omni3d-stack" --format "{{.Tag}}	{{.CreatedAt}}" | grep "dev-release" |             sort -k2 -r | tail -n +3 | awk '{print $1}' |             xargs -I{} docker rmi "omni3d-stack:{}" 2>/dev/null || true
          echo "── Old images cleaned ──"

      # ── S3: build Docker image ──────────────────────────────────────────────
      - name: S3 — Build Docker image
        run: |
          echo "── Building $TEST_IMAGE ──"
          docker build \
            -f omni3d-container/Dockerfile \
            -t "$TEST_IMAGE" \
            .
          echo "── Build complete ──"

  test:
    needs: build
    runs-on: [self-hosted, test-server]

    outputs:
      needs_approval: ${{ steps.email.outputs.needs_approval }}

    env:
      SUBMODULE:      ${{ github.event.client_payload.submodule }}
      SHA:            ${{ github.event.client_payload.sha }}
      PUSHER:         ${{ github.event.client_payload.pusher }}
      TEST_IMAGE:     ${{ needs.build.outputs.test_image }}
      TEST_CONTAINER: omni3d-main
      DSF_DIR:        /opt/dsf
      BACKUP_DIR:     /opt/dsf.backup

    steps:

      - name: Checkout for test
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.OMNI3D_CI }}

      # ── S4: deploy firmware (only when RRF_Environment changed) ─────────────
      - name: S4 — Deploy firmware
        run: |
          if [[ "$SUBMODULE" != "RRF_Environment" ]]; then
            echo "── Firmware repo unchanged — skipping firmware deploy ──"
            exit 0
          fi
          # TODO: implement firmware deployment
          # copy .bin files to /opt/dsf/sd/firmware/
          echo "── Firmware deployment not yet implemented ──"
          exit 0

      # ── S4: deploy config (always) ─────────────────────────────────────────
      - name: S4 — Deploy config
        run: |
          echo "── Deploying config ──"
          ENV_FILE="/home/pro/O3D_Test_Framework/.env"
          source "$ENV_FILE"
          echo "── Machine: $MACHINE_MODEL ──"

          CONFIG_DIR="${MACHINE_MODEL}PRO_Config"
          # handle both OMNIPRO and OMNITECH naming
          if [ -d "OMNIPRO_Config" ] && [ "$MACHINE_MODEL" = "OMNIPRO" ]; then
            CONFIG_DIR="OMNIPRO_Config"
          elif [ -d "OMNITECH_Config" ] && [ "$MACHINE_MODEL" = "OMNITECH" ]; then
            CONFIG_DIR="OMNITECH_Config"
          else
            echo "── No matching config dir for $MACHINE_MODEL — skipping ──"
            exit 0
          fi

          echo "── Deploying $CONFIG_DIR to $DSF_DIR/sd ──"

          # backup first
          sudo rm -rf "$BACKUP_DIR"
          sudo mkdir -p "$BACKUP_DIR/sd"
          sudo cp -r "$DSF_DIR/sd/macros" "$BACKUP_DIR/sd/" 2>/dev/null || true
          sudo cp -r "$DSF_DIR/sd/sys"    "$BACKUP_DIR/sd/" 2>/dev/null || true
          echo "── Backup complete ──"

          # deploy
          sudo cp -r "$CONFIG_DIR/src/macros" "$DSF_DIR/sd/"
          sudo cp -r "$CONFIG_DIR/src/sys"    "$DSF_DIR/sd/"
          echo "── Config deployed ──"

      # ── S5: restart board (only if config changed) ─────────────────────────
      - name: S5 — Restart board
        run: |
          echo "── Config deployed — board restart needed ──"
          echo "── WARNING: Board restart via M999 is disabled until safe command is confirmed ──"
          echo "── Skipping board restart — please restart manually if needed ──"
          # TODO: replace M999 with correct restart command for omni firmware
          # curl -s -X POST http://localhost/machine/code \
          #   -H "Content-Type: text/plain" \
          #   -d "M999" || true
          # sleep 15

      # ── S6: verify board online (only if config changed) ────────────────────
      - name: S6 — Verify board online
        run: |
          echo "── Checking board online ──"
          echo "── Board restart disabled — skipping online check ──"

      # ── S7: start test container via bootloader ─────────────────────────────
      - name: S7 — Start test container via bootloader
        run: |
          echo "── Signalling bootloader to swap to $TEST_IMAGE ──"
          IMAGE="$TEST_IMAGE" ACTION="swap" python3 omni3d-container/scripts/bootloader_cmd.py

      # ── S8: verify all services RUNNING ────────────────────────────────────
      - name: S8 — Verify all services RUNNING
        run: |
          sleep 20
          docker exec omni3d-main supervisorctl status
          FAILED=0
          while IFS= read -r line; do
            NAME=$(echo "$line" | awk '{print $1}')
            STATE=$(echo "$line" | awk '{print $2}')
            if [ "$STATE" != "RUNNING" ]; then
              echo "✗ $NAME is $STATE"
              FAILED=1
            else
              echo "✓ $NAME is RUNNING"
            fi
          done < <(docker exec omni3d-main supervisorctl status)
          if [ "$FAILED" -eq 1 ]; then
            docker exec omni3d-main cat /var/log/supervisord.log
            exit 1
          fi
          echo "── All services RUNNING ──"

      # ── S9: email tester ────────────────────────────────────────────────────
      # stack is running at this point — tester can test immediately
      - name: S9 — Email tester
        id: email
        run: |
          CHECKLIST_FILE="$SUBMODULE/checklist.md"
          if [ ! -f "$CHECKLIST_FILE" ]; then
            echo "── No checklist.md found — skipping email ──"
            echo "needs_approval=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "needs_approval=true" >> $GITHUB_OUTPUT
          TESTER_EMAIL=$(grep "^tester:" "$CHECKLIST_FILE" | sed 's/tester: *//')
          CHECKLIST=$(grep -v "^tester:" "$CHECKLIST_FILE")
          APPROVAL_URL="https://github.com/omni3dteam/O3D_Test_Framework/actions/runs/${{ github.run_id }}"
          TESTER_EMAIL="$TESTER_EMAIL" CHECKLIST="$CHECKLIST" APPROVAL_URL="$APPROVAL_URL" \
            python3 omni3d-container/scripts/send_email.py || echo "── Email failed — continuing anyway ──"
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}

      # ── NOTE: test container stays running until await-approval completes ───
      # cleanup happens in the release job after approval

      - name: Keep container on failure
        if: failure()
        run: |
          echo "── Pipeline failed — container kept for debugging ──"
          echo ""
          echo "── Access the container with: ──"
          echo "  docker exec -it omni3d-main /bin/bash"
          echo ""
          echo "── Check service status: ──"
          echo "  docker exec omni3d-main supervisorctl status"
          echo ""
          echo "── Check logs: ──"
          echo "  docker exec omni3d-main cat /var/log/template.err"
          echo "  docker exec omni3d-main cat /var/log/template.log"
          echo "  docker exec omni3d-main cat /var/log/supervisord.log"
          echo ""
          echo "── Run binary directly: ──"
          echo "  docker exec -it omni3d-main /bin/bash"
          echo ""
          echo "── When done debugging, clean up with: ──"
          echo "  Trigger rollback: ACTION=rollback python3 omni3d-container/scripts/bootloader_cmd.py"

      # ── rollback config on failure ──────────────────────────────────────────
      - name: Rollback config on failure
        if: failure()
        run: |
          echo "── FAILURE — rolling back config ──"
          if [ -d "$BACKUP_DIR/sd" ]; then
            sudo cp -r "$BACKUP_DIR/sd/macros" "$DSF_DIR/sd/" 2>/dev/null || true
            sudo cp -r "$BACKUP_DIR/sd/sys"    "$DSF_DIR/sd/" 2>/dev/null || true
            echo "── Config restored — please restart board manually ──"
          fi

  # ── manual approval gate ─────────────────────────────────────────────────
  await-approval:
    needs: [build, test]
    if: needs.build-and-test.outputs.needs_approval == 'true'
    runs-on: [self-hosted, test-server]
    environment: manual-testing
    steps:
      - name: Awaiting manual testing approval
        run: echo "── Approved ──"

  # ── release ──────────────────────────────────────────────────────────────
  release:
    needs: [build, test, await-approval]
    if: always() && needs.test.result == 'success' && (needs.await-approval.result == 'success' || needs.await-approval.result == 'skipped')
    runs-on: [self-hosted, test-server]

    env:
      SUBMODULE:     ${{ github.event.client_payload.submodule }}
      RELEASE_DIR:   /opt/omni3d/releases
      RELEASE_IMAGE: omni3d-stack:release

    steps:

      - name: Set dev-release tag
        run: |
          DATE_TAG=$(date +%Y%m%d-%H%M%S)
          echo "DEV_RELEASE_TAG=dev-release-${DATE_TAG}" >> $GITHUB_ENV
          echo "── Release will be tagged as dev-release-${DATE_TAG} ──"

      - name: Checkout O3D_Test_Framework + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.OMNI3D_CI }}

      - name: Update all submodules to latest dev
        run: |
          git submodule foreach '
            git fetch origin dev 2>/dev/null || true
            git checkout origin/dev 2>/dev/null || git checkout dev 2>/dev/null || true
          '

      - name: Cleanup test image
        run: |
          docker rmi omni3d-stack:ci-test 2>/dev/null || true
          echo "── Test image removed — omni3d-main kept running ──"

      - name: R0 — Set release version
        run: |
          # find latest tar.gz in /opt/omni3d/releases/ and extract version
          LATEST_TAR=$(ls -t /opt/omni3d/releases/omni3d-stack_*.tar.gz 2>/dev/null | head -1)
          if [ -n "$LATEST_TAR" ]; then
            # extract version from filename e.g. omni3d-stack_1.1.tar.gz → 1.1
            LAST_VERSION=$(basename "$LATEST_TAR" | sed 's/omni3d-stack_//' | sed 's/\.tar\.gz//')
            echo "── Last release: $LAST_VERSION ──"
            MAJOR=$(echo "$LAST_VERSION" | cut -d. -f1)
            MINOR=$(echo "$LAST_VERSION" | cut -d. -f2)
            NEW_VERSION="${MAJOR}.$((MINOR + 1))"
          else
            echo "── No previous release found — starting at 1.0 ──"
            NEW_VERSION="1.0"
          fi
          echo "── New version: $NEW_VERSION ──"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: R0.5 — Generate Dockerfile and supervisord
        run: python3 omni3d-container/scripts/generate_config.py .

      - name: R1 — Build release Docker image
        run: |
          source /home/pro/O3D_Test_Framework/.env
          if [ "$MACHINE_MODEL" = "OMNIPRO" ]; then
            CONFIG_DIR="OMNIPRO_Config"
          elif [ "$MACHINE_MODEL" = "OMNITECH" ]; then
            CONFIG_DIR="OMNITECH_Config"
          else
            CONFIG_DIR="OMNIPRO_Config"
          fi
          echo "── Building release image with config: $CONFIG_DIR ──"
          chmod +x omni3d-container/scripts/build_release.sh
          omni3d-container/scripts/build_release.sh "$CONFIG_DIR" "omni3d-stack:$DEV_RELEASE_TAG"

      - name: R2 — Build deb packages
        run: |
          mkdir -p "$RELEASE_DIR"
          for dir in */; do
            dir="${dir%/}"
            if [ -f "$dir/deb/build_deb.sh" ]; then
              echo "── Building deb for $dir ──"
              cd "$dir/deb"
              chmod +x build_deb.sh
              OMNI3D_CI="${{ secrets.OMNI3D_CI }}" bash build_deb.sh pro
              cp *.deb "$RELEASE_DIR/" 2>/dev/null || true
              NEW_VERSION=$(cat .version 2>/dev/null || echo "1.0")
              cd ../..
            fi
          done
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          ls -lh "$RELEASE_DIR"

      - name: R3 — Export Docker image
        run: |
          mkdir -p "$RELEASE_DIR"
          TAR_FILE="$RELEASE_DIR/${DEV_RELEASE_TAG}.tar.gz"
          docker save "omni3d-stack:$DEV_RELEASE_TAG" | gzip > "$TAR_FILE"
          echo "── Exported: $TAR_FILE ──"
          echo "── $(du -h $TAR_FILE | cut -f1) ──"
          ls -lh "$RELEASE_DIR"

      - name: R4 — Generate versions.json
        run: |
          mkdir -p "$RELEASE_DIR"
          DSF_VERSION=$(dpkg-query -W -f='${Version}' duetsoftwareframework 2>/dev/null || echo "unknown")
          OMNODE_SHA=$(cd OMNI3D_omnode && git rev-parse --short HEAD 2>/dev/null || echo "unknown")

          # collect service SHAs
          SERVICES="{}"
          for dir in */; do
            dir="${dir%/}"
            if [[ "$dir" == *"_Config" ]] || [[ "$dir" == "OMNI3D_omnode" ]] || [[ "$dir" == "omni3d-container" ]]; then
              continue
            fi
            if [ -d "$dir/.git" ] || [ -f "$dir/../.git/modules/$dir/HEAD" ]; then
              SHA=$(cd "$dir" && git rev-parse --short HEAD 2>/dev/null || echo "unknown")
              SERVICES=$(python3 -c "import sys,json; d=json.loads('$SERVICES'); d['$dir']='$SHA'; print(json.dumps(d))")
            fi
          done

          # collect config SHAs
          CONFIGS="{}"
          for dir in *_Config/; do
            dir="${dir%/}"
            if [ -d "$dir" ]; then
              SHA=$(cd "$dir" && git rev-parse --short HEAD 2>/dev/null || echo "unknown")
              CONFIGS=$(python3 -c "import sys,json; d=json.loads('$CONFIGS'); d['$dir']='$SHA'; print(json.dumps(d))")
            fi
          done

          RELEASE_DIR="$RELEASE_DIR"           NEW_VERSION="$NEW_VERSION"           DSF_VERSION="$DSF_VERSION"           OMNODE_SHA="$OMNODE_SHA"           SERVICES="$SERVICES"           CONFIGS="$CONFIGS"           TRIGGERED_BY="${{ github.event.client_payload.pusher }}"           HOSTNAME="$(hostname)"           python3 omni3d-container/scripts/generate_versions.py

      - name: R5 — Download DSF deb
        run: |
          mkdir -p "$RELEASE_DIR"
          DSF_VERSION=$(dpkg-query -W -f='${Version}' duetsoftwareframework 2>/dev/null || echo "")
          if [ -n "$DSF_VERSION" ]; then
            echo "── Downloading DSF $DSF_VERSION deb ──"
            apt-get download duetsoftwareframework=$DSF_VERSION 2>/dev/null &&               mv duetsoftwareframework_*.deb "$RELEASE_DIR/" ||               echo "── Could not download DSF deb — skipping ──"
          fi
          ls -lh "$RELEASE_DIR"

      - name: Cleanup
        if: always()
        run: |
          docker rmi "$RELEASE_IMAGE" 2>/dev/null || true
          # clean old dev-release images keeping 2 most recent
          docker images "omni3d-stack" --format "{{.Tag}}\t{{.CreatedAt}}" | grep "dev-release" | \
            sort -k2 -r | tail -n +3 | awk '{print $1}' | \
            xargs -I{} docker rmi "omni3d-stack:{}" 2>/dev/null || true
