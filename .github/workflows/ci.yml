name: CI

on:
  repository_dispatch:
    types: [submodule-updated]

jobs:

  # ── runs for service repos (not config) ───────────────────────────────────
  build-and-test:
    if: |
      github.event.client_payload.ref == 'refs/heads/dev' &&
      !contains(github.event.client_payload.submodule, '_Config')
    runs-on: [self-hosted, test-server]

    outputs:
      submodule:      ${{ env.SUBMODULE }}
      sha:            ${{ env.SHA }}
      pusher:         ${{ env.PUSHER }}
      needs_approval: ${{ steps.email.outputs.needs_approval }}

    env:
      SUBMODULE:      ${{ github.event.client_payload.submodule }}
      SHA:            ${{ github.event.client_payload.sha }}
      PUSHER:         ${{ github.event.client_payload.pusher }}
      TEST_IMAGE:     omni3d-stack:ci-test
      TEST_CONTAINER: omni3d-ci-test

    steps:

      - name: S1 — Checkout O3D_Test_Framework + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.OMNI3D_CI }}

      - name: S1 — Update ${{ env.SUBMODULE }} to pushed commit
        run: |
          echo "Triggered by $PUSHER for $SUBMODULE"
          cd "$SUBMODULE"
          git fetch origin dev
          git checkout "$SHA"
          git log -1 --oneline

      - name: S2 — Unit tests
        run: |
          cd "$SUBMODULE"
          if [ -d "tests" ]; then
            python3 -m pytest tests/ -v
          else
            echo "── No tests/ directory, skipping ──"
          fi

      - name: S3 — Build Docker image
        run: |
          docker build \
            -f omni3d-container/Dockerfile \
            -t "$TEST_IMAGE" \
            .

      - name: S4 — Start test container
        run: |
          docker rm -f "$TEST_CONTAINER" 2>/dev/null || true
          ls -la /var/run/dsf/
          docker run -d \
            --name "$TEST_CONTAINER" \
            -v /var/run/dsf:/var/run/dsf \
            -v /run/omni3d:/run/omni3d \
            -v /opt/dsf/sd/timelaps:/opt/dsf/sd/timelaps \
            -v /opt/dsf/timelaps:/opt/dsf/timelaps \
            -v /opt/omni3d/config:/app/config \
            --add-host host-gateway:host-gateway \
            --group-add 992 \
            "$TEST_IMAGE"
          sleep 2
          docker exec "$TEST_CONTAINER" ls -la /var/run/dsf/

      - name: S5 — Verify all services RUNNING
        run: |
          sleep 20
          docker exec "$TEST_CONTAINER" supervisorctl status
          FAILED=0
          while IFS= read -r line; do
            NAME=$(echo "$line" | awk '{print $1}')
            STATE=$(echo "$line" | awk '{print $2}')
            if [ "$STATE" != "RUNNING" ]; then
              echo "✗ $NAME is $STATE"
              FAILED=1
            else
              echo "✓ $NAME is RUNNING"
            fi
          done < <(docker exec "$TEST_CONTAINER" supervisorctl status)
          if [ "$FAILED" -eq 1 ]; then
            docker exec "$TEST_CONTAINER" cat /var/log/supervisord.log
            docker exec "$TEST_CONTAINER" cat /var/log/template.err || true
            exit 1
          fi
          echo "── All services RUNNING ──"

      - name: S6 — Email tester
        id: email
        run: |
          CHECKLIST_FILE="$SUBMODULE/checklist.md"
          if [ ! -f "$CHECKLIST_FILE" ]; then
            echo "── No checklist.md found — skipping email ──"
            echo "needs_approval=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "needs_approval=true" >> $GITHUB_OUTPUT
          TESTER_EMAIL=$(grep "^tester:" "$CHECKLIST_FILE" | sed 's/tester: *//')
          CHECKLIST=$(grep -v "^tester:" "$CHECKLIST_FILE")
          APPROVAL_URL="https://github.com/omni3dteam/O3D_Test_Framework/actions/runs/${{ github.run_id }}"
          TESTER_EMAIL="$TESTER_EMAIL" CHECKLIST="$CHECKLIST" APPROVAL_URL="$APPROVAL_URL" \
            python3 omni3d-container/scripts/send_email.py
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}

      - name: Cleanup
        if: always()
        run: |
          docker stop "$TEST_CONTAINER" 2>/dev/null || true
          docker rm   "$TEST_CONTAINER" 2>/dev/null || true
          docker rmi  "$TEST_IMAGE"     2>/dev/null || true

  # ── manual approval gate ───────────────────────────────────────────────────
  await-approval:
    needs: build-and-test
    if: needs.build-and-test.outputs.needs_approval == 'true'
    runs-on: [self-hosted, test-server]
    environment: manual-testing
    steps:
      - name: Awaiting manual testing approval
        run: echo "── Approved — proceeding to release ──"

  # ── release ───────────────────────────────────────────────────────────────
  release:
    needs: [build-and-test, await-approval]
    if: always() && needs.build-and-test.result == 'success' && (needs.await-approval.result == 'success' || needs.await-approval.result == 'skipped')
    runs-on: [self-hosted, test-server]

    env:
      SUBMODULE:     ${{ needs.build-and-test.outputs.submodule }}
      SHA:           ${{ needs.build-and-test.outputs.sha }}
      RELEASE_DIR:   /opt/omni3d/releases
      RELEASE_IMAGE: omni3d-stack:release

    steps:

      - name: Checkout O3D_Test_Framework + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.OMNI3D_CI }}

      - name: Update ${{ env.SUBMODULE }} to release commit
        run: |
          cd "$SUBMODULE"
          git fetch origin dev
          git checkout "$SHA"

      - name: R1 — Build release Docker image
        run: |
          docker build \
            -f omni3d-container/Dockerfile \
            -t "$RELEASE_IMAGE" \
            .

      - name: R2 — Build deb package
        run: |
          cd "$SUBMODULE/deb"
          if [ -f "build_deb.sh" ]; then
            chmod +x build_deb.sh
            OMNI3D_CI="${{ secrets.OMNI3D_CI }}" bash build_deb.sh
            NEW_VERSION=$(cat .version 2>/dev/null || echo "1.0")
            echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
            mkdir -p "$RELEASE_DIR"
            cp *.deb "$RELEASE_DIR/"
            ls -lh "$RELEASE_DIR"/*.deb
          fi

      - name: R3 — Export Docker image
        run: |
          mkdir -p "$RELEASE_DIR"
          docker tag "$RELEASE_IMAGE" "omni3d-stack:$NEW_VERSION"
          docker tag "$RELEASE_IMAGE" "omni3d-stack:latest"
          TAR_FILE="$RELEASE_DIR/omni3d-stack_${NEW_VERSION}.tar.gz"
          docker save "omni3d-stack:$NEW_VERSION" | gzip > "$TAR_FILE"
          echo "── $(du -h $TAR_FILE | cut -f1) ──"
          ls -lh "$RELEASE_DIR"

      - name: Cleanup
        if: always()
        run: docker rmi "$RELEASE_IMAGE" 2>/dev/null || true

  # ── runs for config repos only ─────────────────────────────────────────────
  deploy-config:
    if: |
      github.event.client_payload.ref == 'refs/heads/dev' &&
      contains(github.event.client_payload.submodule, '_Config')
    runs-on: [self-hosted, test-server]

    env:
      SUBMODULE:  ${{ github.event.client_payload.submodule }}
      SHA:        ${{ github.event.client_payload.sha }}
      PUSHER:     ${{ github.event.client_payload.pusher }}
      DSF_DIR:    /opt/dsf
      BACKUP_DIR: /opt/dsf.backup

    steps:

      - name: Check machine model
        run: |
          ENV_FILE="/home/pro/O3D_Test_Framework/.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "── .env not found — cannot determine machine model ──"
            exit 1
          fi
          source "$ENV_FILE"
          echo "── Machine: $MACHINE_MODEL, Submodule: $SUBMODULE ──"
          EXPECTED_MODEL=$(echo "$SUBMODULE" | sed 's/_Config//')
          if [ "$MACHINE_MODEL" != "$EXPECTED_MODEL" ]; then
            echo "── Machine is $MACHINE_MODEL, skipping $SUBMODULE ──"
            exit 0
          fi
          echo "── Machine matches — proceeding ──"
          echo "MACHINE_MODEL=$MACHINE_MODEL" >> $GITHUB_ENV

      - name: S1 — Checkout O3D_Test_Framework + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.OMNI3D_CI }}

      - name: S1 — Update ${{ env.SUBMODULE }} to pushed commit
        run: |
          cd "$SUBMODULE"
          git fetch origin dev
          git checkout "$SHA"
          git log -1 --oneline

      - name: S2 — Validate config files
        run: |
          find "$SUBMODULE/src" -name "*.json" | while read f; do
            python3 -c "import json; json.load(open('$f'))" \
              && echo "✓ $f" \
              || { echo "✗ Invalid JSON: $f"; exit 1; }
          done
          echo "── Validation passed ──"

      - name: S3 — Stop services
        run: |
          docker stop omni3d-stack 2>/dev/null || true
          echo "── Services stopped ──"

      - name: S4 — Backup current config
        run: |
          rm -rf "$BACKUP_DIR"
          cp -r "$DSF_DIR" "$BACKUP_DIR"
          echo "── Backup complete ──"

      - name: S5 — Deploy config
        run: |
          cp -r "$SUBMODULE/src/macros" "$DSF_DIR/"
          cp -r "$SUBMODULE/src/sys"    "$DSF_DIR/"
          echo "── Deploy complete ──"

      - name: S6 — Restart board
        run: |
          curl -s -X POST http://localhost/machine/code \
            -H "Content-Type: text/plain" \
            -d "M999" || true
          echo "── Waiting 15 seconds ──"
          sleep 15

      - name: S7 — Verify board online
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost/machine/model --max-time 10 || echo "000")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "✗ DSF not responding ($HTTP_CODE)"
            exit 1
          fi
          echo "✓ DSF responding"

      - name: S8 — Start services
        run: |
          docker start omni3d-stack
          sleep 10
          FAILED=0
          while IFS= read -r line; do
            NAME=$(echo "$line" | awk '{print $1}')
            STATE=$(echo "$line" | awk '{print $2}')
            if [ "$STATE" != "RUNNING" ]; then
              echo "✗ $NAME is $STATE"
              FAILED=1
            else
              echo "✓ $NAME is RUNNING"
            fi
          done < <(docker exec omni3d-stack supervisorctl status)
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "── All services RUNNING ──"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "── FAILURE — rolling back ──"
          docker stop omni3d-stack 2>/dev/null || true
          if [ -d "$BACKUP_DIR" ]; then
            cp -r "$BACKUP_DIR/." "$DSF_DIR/"
            echo "── Config restored ──"
          fi
          curl -s -X POST http://localhost/machine/code \
            -H "Content-Type: text/plain" \
            -d "M999" || true
          sleep 15
          docker start omni3d-stack 2>/dev/null || true
          echo "── Rollback complete ──"

      - name: Report status
        if: always()
        run: echo "Config deploy ${{ job.status }} for $SUBMODULE @ $SHA"
