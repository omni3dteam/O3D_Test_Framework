name: Dev Build

on:
  repository_dispatch:
    types: [submodule-updated]
  workflow_dispatch:
    inputs:
      submodule:
        description: 'Submodule to test'
        required: true
        default: 'OMNI3D_Template'
      sha:
        description: 'Commit SHA (leave empty for latest dev)'
        required: false

jobs:
  build-and-test:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.client_payload.ref == 'refs/heads/dev'
    runs-on: [self-hosted, test-server]

    env:
      SUBMODULE:      ${{ github.event_name == 'workflow_dispatch' && inputs.submodule || github.event.client_payload.submodule }}
      SHA:            ${{ github.event_name == 'workflow_dispatch' && inputs.sha || github.event.client_payload.sha }}
      PUSHER:         ${{ github.event_name == 'workflow_dispatch' && github.actor || github.event.client_payload.pusher }}
      TEST_IMAGE:     omni3d-stack:ci-test
      TEST_CONTAINER: omni3d-ci-test
      RELEASE_DIR:    /opt/omni3d/releases

    steps:

      # ── S1: checkout ──────────────────────────────────────────────────────────
      - name: S1 — Checkout O3D_Test_Framework + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.OMNI3D_CI }}

      - name: S1 — Update ${{ env.SUBMODULE }} to pushed commit
        run: |
          echo "Triggered by $PUSHER for $SUBMODULE"
          cd "$SUBMODULE"
          git fetch origin dev
          if [ -n "$SHA" ]; then
            git checkout "$SHA"
          else
            git checkout origin/dev
          fi
          git log -1 --oneline

      # ── S2: unit tests ────────────────────────────────────────────────────────
      - name: S2 — Unit tests
        run: |
          cd "$SUBMODULE"
          if [ -d "tests" ]; then
            echo "── Running pytest ──"
            python3 -m pytest tests/ -v
          else
            echo "── No tests/ directory, skipping ──"
          fi

      # ── S3: build Docker image ────────────────────────────────────────────────
      - name: S3 — Build Docker image
        run: |
          echo "── Building $TEST_IMAGE ──"
          docker build \
            -f omni3d-container/Dockerfile \
            -t "$TEST_IMAGE" \
            .
          echo "── Build complete ──"

      # ── S4: run test container ────────────────────────────────────────────────
      - name: S4 — Start test container
        run: |
          docker rm -f "$TEST_CONTAINER" 2>/dev/null || true

          echo "── DSF socket on host ──"
          ls -la /var/run/dsf/

          echo "── Starting $TEST_CONTAINER ──"
          docker run -d \
            --name "$TEST_CONTAINER" \
            -v /var/run/dsf:/var/run/dsf \
            -v /run/omni3d:/run/omni3d \
            -v /opt/dsf/sd/timelaps:/opt/dsf/sd/timelaps \
            -v /opt/dsf/timelaps:/opt/dsf/timelaps \
            -v /opt/omni3d/config:/app/config \
            --add-host host-gateway:host-gateway \
            --group-add 992 \
            "$TEST_IMAGE"

          echo "── Verify socket inside container ──"
          sleep 2
          docker exec "$TEST_CONTAINER" ls -la /var/run/dsf/
          docker exec "$TEST_CONTAINER" id

      # ── S5: integration test ──────────────────────────────────────────────────
      - name: S5 — Verify all services RUNNING
        run: |
          echo "── Waiting 20 seconds for services to initialise ──"
          sleep 20

          echo "── Supervisorctl status ──"
          docker exec "$TEST_CONTAINER" supervisorctl status

          FAILED=0
          while IFS= read -r line; do
            NAME=$(echo "$line" | awk '{print $1}')
            STATE=$(echo "$line" | awk '{print $2}')
            if [ "$STATE" != "RUNNING" ]; then
              echo "✗ $NAME is $STATE — expected RUNNING"
              FAILED=1
            else
              echo "✓ $NAME is RUNNING"
            fi
          done < <(docker exec "$TEST_CONTAINER" supervisorctl status)

          if [ "$FAILED" -eq 1 ]; then
            echo "── Supervisord log ──"
            docker exec "$TEST_CONTAINER" cat /var/log/supervisord.log
            echo "── template.err ──"
            docker exec "$TEST_CONTAINER" cat /var/log/template.err || true
            echo "── template.log ──"
            docker exec "$TEST_CONTAINER" cat /var/log/template.log || true
            exit 1
          fi

          echo "── All services RUNNING — integration test passed ──"

      # ── S6: build deb package ─────────────────────────────────────────────────
      - name: S6 — Build deb package
        run: |
          echo "── Building deb for $SUBMODULE ──"
          cd "$SUBMODULE/deb"
          if [ -f "build_deb.sh" ]; then
            chmod +x build_deb.sh
            OMNI3D_CI="${{ secrets.OMNI3D_CI }}" \
            bash build_deb.sh
            NEW_VERSION=$(cat .version 2>/dev/null || echo "1.0")
            echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
            echo "── Deb built ──"
            ls -lh *.deb
          else
            echo "── No build_deb.sh found, skipping ──"
          fi

      # ── S7: tag and export Docker image ───────────────────────────────────────
      - name: S7 — Tag and export Docker image
        run: |
          mkdir -p "$RELEASE_DIR"

          docker tag "$TEST_IMAGE" "omni3d-stack:$NEW_VERSION"
          docker tag "$TEST_IMAGE" "omni3d-stack:latest"
          echo "── Tagged: omni3d-stack:$NEW_VERSION ──"

          TAR_FILE="$RELEASE_DIR/omni3d-stack_${NEW_VERSION}.tar.gz"
          echo "── Exporting image to $TAR_FILE ──"
          docker save "omni3d-stack:$NEW_VERSION" | gzip > "$TAR_FILE"
          echo "── Export complete: $(du -h $TAR_FILE | cut -f1) ──"
          ls -lh "$RELEASE_DIR"

      # ── cleanup test container only, keep the image and tar ──────────────────
      - name: Cleanup — Remove test container
        if: always()
        run: |
          docker stop "$TEST_CONTAINER" 2>/dev/null || true
          docker rm   "$TEST_CONTAINER" 2>/dev/null || true
          docker rmi  "$TEST_IMAGE"     2>/dev/null || true
          echo "── Test container removed ──"
          echo "── Release image kept: omni3d-stack:$NEW_VERSION ──"
          echo "── Release tar kept: $RELEASE_DIR/omni3d-stack_${NEW_VERSION}.tar.gz ──"

      - name: Report status
        if: always()
        run: |
          echo "Build ${{ job.status }} for $SUBMODULE @ $SHA v$NEW_VERSION pushed by $PUSHER"
