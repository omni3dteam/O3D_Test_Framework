name: CI

on:
  repository_dispatch:
    types: [submodule-updated]

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  build-and-test:
    if: github.event.client_payload.ref == 'refs/heads/dev'
    runs-on: [self-hosted, test-server]

    outputs:
      needs_approval: ${{ steps.email.outputs.needs_approval }}

    env:
      SUBMODULE:      ${{ github.event.client_payload.submodule }}
      SHA:            ${{ github.event.client_payload.sha }}
      PUSHER:         ${{ github.event.client_payload.pusher }}
      TEST_IMAGE:     omni3d-stack:ci-test
      TEST_CONTAINER: omni3d-ci-test
      DSF_DIR:        /opt/dsf
      BACKUP_DIR:     /opt/dsf.backup

    steps:

      # ── S0: check machine is not printing ────────────────────────────────────
      - name: S0 — Check machine is not printing
        run: |
          echo "── Checking machine status ──"
          STATUS=$(curl -s "http://localhost/rr_connect?password=" > /dev/null &&             curl -s "http://localhost/rr_model?key=state.status" | python3 -c "import sys,json; print(json.load(sys.stdin)['result'])" 2>/dev/null || echo "unknown")
          echo "── Machine status: $STATUS ──"
          if [ "$STATUS" = "processing" ]; then
            echo "── Machine is printing — cancelling CI ──"
            echo "── Reason: Machine is busy ──"
            exit 1
          fi
          echo "✓ Machine is idle — proceeding"

      # ── S1: checkout all submodules at latest dev ───────────────────────────
      - name: S1 — Checkout all submodules at latest dev
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.OMNI3D_CI }}

      - name: S1 — Update all submodules to latest dev
        run: |
          echo "── Triggered by $PUSHER pushing to $SUBMODULE ──"
          git submodule foreach '
            git fetch origin dev 2>/dev/null || true
            git checkout origin/dev 2>/dev/null || git checkout dev 2>/dev/null || true
            echo "── $name: $(git log -1 --oneline) ──"
          '

      # ── S2: unit tests for all services ────────────────────────────────────
      - name: S2 — Unit tests
        run: |
          FAILED=0
          for dir in */; do
            dir="${dir%/}"
            # skip config repos and omnode
            if [[ "$dir" == *"_Config" ]] || [[ "$dir" == "OMNI3D_omnode" ]] || [[ "$dir" == "omni3d-container" ]]; then
              continue
            fi
            if [ -d "$dir/tests" ] && [ -f "$dir/pytest.ini" ]; then
              echo "── Testing $dir ──"
              cd "$dir"
              python3 -m pytest tests/ -v || FAILED=1
              cd ..
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "✗ Unit tests failed"
            exit 1
          fi
          echo "✓ All unit tests passed"

      # ── S3: build Docker image ──────────────────────────────────────────────
      - name: S3 — Build Docker image
        run: |
          echo "── Building $TEST_IMAGE ──"
          docker build \
            -f omni3d-container/Dockerfile \
            -t "$TEST_IMAGE" \
            .
          echo "── Build complete ──"

      # ── S4: deploy config (only when config repo changed) ──────────────────
      - name: S4 — Deploy config
        run: |
          if [[ "$SUBMODULE" != *"_Config" ]]; then
            echo "── $SUBMODULE is not a config repo — skipping config deploy ──"
            exit 0
          fi
          ENV_FILE="/home/pro/O3D_Test_Framework/.env"
          source "$ENV_FILE"
          echo "── Machine: $MACHINE_MODEL ──"

          CONFIG_DIR="${MACHINE_MODEL}PRO_Config"
          # handle both OMNIPRO and OMNITECH naming
          if [ -d "OMNIPRO_Config" ] && [ "$MACHINE_MODEL" = "OMNIPRO" ]; then
            CONFIG_DIR="OMNIPRO_Config"
          elif [ -d "OMNITECH_Config" ] && [ "$MACHINE_MODEL" = "OMNITECH" ]; then
            CONFIG_DIR="OMNITECH_Config"
          else
            echo "── No matching config dir for $MACHINE_MODEL — skipping ──"
            exit 0
          fi

          echo "── Deploying $CONFIG_DIR to $DSF_DIR/sd ──"

          # backup first
          sudo rm -rf "$BACKUP_DIR"
          sudo mkdir -p "$BACKUP_DIR/sd"
          sudo cp -r "$DSF_DIR/sd/macros" "$BACKUP_DIR/sd/" 2>/dev/null || true
          sudo cp -r "$DSF_DIR/sd/sys"    "$BACKUP_DIR/sd/" 2>/dev/null || true
          echo "── Backup complete ──"

          # deploy
          sudo cp -r "$CONFIG_DIR/src/macros" "$DSF_DIR/sd/"
          sudo cp -r "$CONFIG_DIR/src/sys"    "$DSF_DIR/sd/"
          echo "── Config deployed ──"

      # ── S5: restart board (only if config changed) ─────────────────────────
      - name: S5 — Restart board
        run: |
          if [[ "$SUBMODULE" != *"_Config" ]]; then
            echo "── Config unchanged — skipping board restart ──"
            exit 0
          fi
          echo "── Sending M999 ──"
          curl -s -X POST http://localhost/machine/code \
            -H "Content-Type: text/plain" \
            -d "M999" || true
          echo "── Waiting 15 seconds for board ──"
          sleep 15

      # ── S6: verify board online (only if config changed) ────────────────────
      - name: S6 — Verify board online
        run: |
          if [[ "$SUBMODULE" != *"_Config" ]]; then
            echo "── Board not restarted — skipping check ──"
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost/machine/model --max-time 10 || echo "000")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "✗ DSF not responding ($HTTP_CODE)"
            exit 1
          fi
          echo "✓ DSF responding"

      # ── S7: start test container ────────────────────────────────────────────
      - name: S7 — Start test container
        run: |
          docker rm -f "$TEST_CONTAINER" 2>/dev/null || true
          docker run -d \
            --name "$TEST_CONTAINER" \
            -v /var/run/dsf:/var/run/dsf \
            -v /run/omni3d:/run/omni3d \
            -v /opt/dsf/sd/timelaps:/opt/dsf/sd/timelaps \
            -v /opt/dsf/timelaps:/opt/dsf/timelaps \
            -v /opt/omni3d/config:/app/config \
            --add-host host-gateway:host-gateway \
            --group-add 992 \
            "$TEST_IMAGE"
          sleep 2

      # ── S8: verify all services RUNNING ────────────────────────────────────
      - name: S8 — Verify all services RUNNING
        run: |
          sleep 20
          docker exec "$TEST_CONTAINER" supervisorctl status
          FAILED=0
          while IFS= read -r line; do
            NAME=$(echo "$line" | awk '{print $1}')
            STATE=$(echo "$line" | awk '{print $2}')
            if [ "$STATE" != "RUNNING" ]; then
              echo "✗ $NAME is $STATE"
              FAILED=1
            else
              echo "✓ $NAME is RUNNING"
            fi
          done < <(docker exec "$TEST_CONTAINER" supervisorctl status)
          if [ "$FAILED" -eq 1 ]; then
            docker exec "$TEST_CONTAINER" cat /var/log/supervisord.log
            exit 1
          fi
          echo "── All services RUNNING ──"

      # ── S9: email tester ────────────────────────────────────────────────────
      - name: S9 — Email tester
        id: email
        run: |
          # use checklist from triggered submodule if exists
          CHECKLIST_FILE="$SUBMODULE/checklist.md"
          if [ ! -f "$CHECKLIST_FILE" ]; then
            echo "── No checklist.md found — skipping email ──"
            echo "needs_approval=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "needs_approval=true" >> $GITHUB_OUTPUT
          TESTER_EMAIL=$(grep "^tester:" "$CHECKLIST_FILE" | sed 's/tester: *//')
          CHECKLIST=$(grep -v "^tester:" "$CHECKLIST_FILE")
          APPROVAL_URL="https://github.com/omni3dteam/O3D_Test_Framework/actions/runs/${{ github.run_id }}"
          TESTER_EMAIL="$TESTER_EMAIL" CHECKLIST="$CHECKLIST" APPROVAL_URL="$APPROVAL_URL" \
            python3 omni3d-container/scripts/send_email.py
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}

      # ── cleanup test container ──────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          docker stop "$TEST_CONTAINER" 2>/dev/null || true
          docker rm   "$TEST_CONTAINER" 2>/dev/null || true
          docker rmi  "$TEST_IMAGE"     2>/dev/null || true

      # ── rollback config on failure ──────────────────────────────────────────
      - name: Rollback config on failure
        if: failure()
        run: |
          echo "── FAILURE — rolling back config ──"
          if [ -d "$BACKUP_DIR/sd" ]; then
            sudo cp -r "$BACKUP_DIR/sd/macros" "$DSF_DIR/sd/" 2>/dev/null || true
            sudo cp -r "$BACKUP_DIR/sd/sys"    "$DSF_DIR/sd/" 2>/dev/null || true
            curl -s -X POST http://localhost/machine/code \
              -H "Content-Type: text/plain" \
              -d "M999" || true
            echo "── Config rolled back ──"
          fi

  # ── manual approval gate ─────────────────────────────────────────────────
  await-approval:
    needs: build-and-test
    if: needs.build-and-test.outputs.needs_approval == 'true'
    runs-on: [self-hosted, test-server]
    environment: manual-testing
    steps:
      - name: Awaiting manual testing approval
        run: echo "── Approved ──"

  # ── release ──────────────────────────────────────────────────────────────
  release:
    needs: [build-and-test, await-approval]
    if: always() && needs.build-and-test.result == 'success' && (needs.await-approval.result == 'success' || needs.await-approval.result == 'skipped')
    runs-on: [self-hosted, test-server]

    env:
      SUBMODULE:     ${{ github.event.client_payload.submodule }}
      RELEASE_DIR:   /opt/omni3d/releases
      RELEASE_IMAGE: omni3d-stack:release

    steps:

      - name: Checkout O3D_Test_Framework + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.OMNI3D_CI }}

      - name: Update all submodules to latest dev
        run: |
          git submodule foreach '
            git fetch origin dev 2>/dev/null || true
            git checkout origin/dev 2>/dev/null || git checkout dev 2>/dev/null || true
          '

      - name: R1 — Build release Docker image
        run: |
          docker build \
            -f omni3d-container/Dockerfile \
            -t "$RELEASE_IMAGE" \
            .

      - name: R2 — Build deb packages
        run: |
          mkdir -p "$RELEASE_DIR"
          for dir in */; do
            dir="${dir%/}"
            if [ -f "$dir/deb/build_deb.sh" ]; then
              echo "── Building deb for $dir ──"
              cd "$dir/deb"
              chmod +x build_deb.sh
              OMNI3D_CI="${{ secrets.OMNI3D_CI }}" bash build_deb.sh pro
              cp *.deb "$RELEASE_DIR/" 2>/dev/null || true
              NEW_VERSION=$(cat .version 2>/dev/null || echo "1.0")
              cd ../..
            fi
          done
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          ls -lh "$RELEASE_DIR"

      - name: R3 — Export Docker image
        run: |
          mkdir -p "$RELEASE_DIR"
          docker tag "$RELEASE_IMAGE" "omni3d-stack:$NEW_VERSION"
          docker tag "$RELEASE_IMAGE" "omni3d-stack:latest"
          TAR_FILE="$RELEASE_DIR/omni3d-stack_${NEW_VERSION}.tar.gz"
          docker save "omni3d-stack:$NEW_VERSION" | gzip > "$TAR_FILE"
          echo "── $(du -h $TAR_FILE | cut -f1) ──"
          ls -lh "$RELEASE_DIR"

      - name: R4 — Generate versions.json
        run: |
          mkdir -p "$RELEASE_DIR"
          DSF_VERSION=$(dpkg-query -W -f='${Version}' duetsoftwareframework 2>/dev/null || echo "unknown")
          RELEASED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # collect service SHAs
          SERVICES="{}"
          for dir in */; do
            dir="${dir%/}"
            if [[ "$dir" == *"_Config" ]] || [[ "$dir" == "OMNI3D_omnode" ]] || [[ "$dir" == "omni3d-container" ]]; then
              continue
            fi
            if [ -f "$dir/.git/HEAD" ] || [ -d "$dir/.git" ]; then
              SHA=$(cd "$dir" && git rev-parse --short HEAD 2>/dev/null || echo "unknown")
              SERVICES=$(echo "$SERVICES" | python3 -c "
import sys, json
d = json.load(sys.stdin)
d['$dir'] = '$SHA'
print(json.dumps(d))")
            fi
          done

          # collect config SHAs
          CONFIGS="{}"
          for dir in *_Config/; do
            dir="${dir%/}"
            if [ -d "$dir" ]; then
              SHA=$(cd "$dir" && git rev-parse --short HEAD 2>/dev/null || echo "unknown")
              CONFIGS=$(echo "$CONFIGS" | python3 -c "
import sys, json
d = json.load(sys.stdin)
d['$dir'] = '$SHA'
print(json.dumps(d))")
            fi
          done

          OMNODE_VERSION=$(cd OMNI3D_omnode && git rev-parse --short HEAD 2>/dev/null || echo "unknown")

          python3 - << PYEOF
import json
import urllib.request

# query boards from DSF HTTP API
boards = []
try:
    urllib.request.urlopen("http://localhost/rr_connect?password=", timeout=5)
    with urllib.request.urlopen("http://localhost/rr_model?key=boards", timeout=5) as r:
        result = json.loads(r.read())["result"]
        for board in result:
            boards.append({
                "name":            board.get("name", "unknown"),
                "shortName":       board.get("shortName", "unknown"),
                "firmwareVersion": board.get("firmwareVersion", "unknown"),
                "firmwareName":    board.get("firmwareName", "unknown"),
                "firmwareDate":    board.get("firmwareDate", "unknown"),
                "firmwareFileName":board.get("firmwareFileName", "unknown"),
                "uniqueId":        board.get("uniqueId", "unknown"),
                "canAddress":      board.get("canAddress", 0),
            })
except Exception as e:
    boards = [{"error": str(e)}]

data = {
    "released": "$RELEASED",
    "container": "$NEW_VERSION",
    "dsf": "$DSF_VERSION",
    "omnode": "$OMNODE_VERSION",
    "services": $SERVICES,
    "config": $CONFIGS,
    "boards": boards,
    "tested_on": "$(hostname)",
    "triggered_by": "${{ github.event.client_payload.pusher }}"
}

with open("$RELEASE_DIR/versions.json", "w") as f:
    json.dump(data, f, indent=2)

print(json.dumps(data, indent=2))
PYEOF
          echo "── versions.json written ──"

      - name: R5 — Download DSF deb
        run: |
          mkdir -p "$RELEASE_DIR"
          DSF_VERSION=$(dpkg-query -W -f='${Version}' duetsoftwareframework 2>/dev/null || echo "")
          if [ -n "$DSF_VERSION" ]; then
            echo "── Downloading DSF $DSF_VERSION deb ──"
            apt-get download duetsoftwareframework=$DSF_VERSION 2>/dev/null &&               mv duetsoftwareframework_*.deb "$RELEASE_DIR/" ||               echo "── Could not download DSF deb — skipping ──"
          fi
          ls -lh "$RELEASE_DIR"

      - name: Cleanup
        if: always()
        run: docker rmi "$RELEASE_IMAGE" 2>/dev/null || true
