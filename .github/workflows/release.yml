name: Release

on:
  workflow_dispatch:
    inputs:
      submodule:
        description: 'Submodule to release'
        required: true
        default: 'OMNI3D_Template'
      sha:
        description: 'Commit SHA to release'
        required: true

jobs:
  release:
    runs-on: [self-hosted, test-server]

    env:
      SUBMODULE:    ${{ inputs.submodule }}
      SHA:          ${{ inputs.sha }}
      RELEASE_DIR:  /opt/omni3d/releases
      RELEASE_IMAGE: omni3d-stack:release

    steps:

      # ── checkout ──────────────────────────────────────────────────────────────
      - name: Checkout O3D_Test_Framework + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.OMNI3D_CI }}

      - name: Update ${{ env.SUBMODULE }} to release commit
        run: |
          cd "$SUBMODULE"
          git fetch origin dev
          git checkout "$SHA"
          git log -1 --oneline

      # ── build release Docker image ────────────────────────────────────────────
      - name: R1 — Build release Docker image
        run: |
          echo "── Building release image ──"
          docker build \
            -f omni3d-container/Dockerfile \
            -t "$RELEASE_IMAGE" \
            .
          echo "── Build complete ──"

      # ── build deb ─────────────────────────────────────────────────────────────
      - name: R2 — Build deb package
        run: |
          cd "$SUBMODULE/deb"
          if [ -f "build_deb.sh" ]; then
            chmod +x build_deb.sh
            OMNI3D_CI="${{ secrets.OMNI3D_CI }}" \
            bash build_deb.sh
            NEW_VERSION=$(cat .version 2>/dev/null || echo "1.0")
            echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
            mkdir -p "$RELEASE_DIR"
            cp *.deb "$RELEASE_DIR/"
            echo "── Deb copied to $RELEASE_DIR ──"
            ls -lh "$RELEASE_DIR"/*.deb
          fi

      # ── export Docker image ───────────────────────────────────────────────────
      - name: R3 — Export Docker image
        run: |
          mkdir -p "$RELEASE_DIR"

          docker tag "$RELEASE_IMAGE" "omni3d-stack:$NEW_VERSION"
          docker tag "$RELEASE_IMAGE" "omni3d-stack:latest"

          TAR_FILE="$RELEASE_DIR/omni3d-stack_${NEW_VERSION}.tar.gz"
          echo "── Exporting to $TAR_FILE ──"
          docker save "omni3d-stack:$NEW_VERSION" | gzip > "$TAR_FILE"
          echo "── Export complete: $(du -h $TAR_FILE | cut -f1) ──"
          ls -lh "$RELEASE_DIR"

      # ── cleanup ───────────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          docker rmi "$RELEASE_IMAGE" 2>/dev/null || true
          echo "── Release complete ──"
          echo "── Artefacts in $RELEASE_DIR ──"

      - name: Report status
        if: always()
        run: |
          echo "Release ${{ job.status }} for $SUBMODULE @ $SHA v$NEW_VERSION"
