name: Dev Build

on:
  repository_dispatch:
    types: [submodule-updated]
  workflow_dispatch:
    inputs:
      submodule:
        description: 'Submodule to test'
        required: true
        default: 'OMNI3D_Template'
      sha:
        description: 'Commit SHA (leave empty for latest dev)'
        required: false

jobs:
  build-and-test:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.client_payload.ref == 'refs/heads/dev'
    runs-on: [self-hosted, test-server]

    env:
      SUBMODULE: ${{ github.event_name == 'workflow_dispatch' && inputs.submodule || github.event.client_payload.submodule }}
      SHA:       ${{ github.event_name == 'workflow_dispatch' && inputs.sha || github.event.client_payload.sha }}
      PUSHER:    ${{ github.event_name == 'workflow_dispatch' && github.actor || github.event.client_payload.pusher }}
      TEST_IMAGE:     omni3d-stack:ci-test
      TEST_CONTAINER: omni3d-ci-test

    steps:

      # ── S1: checkout ──────────────────────────────────────────────────────────
      - name: S1 — Checkout O3D_Test_Framework + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.OMNI3D_CI }}

      - name: S1 — Update ${{ env.SUBMODULE }} to pushed commit
        run: |
          echo "Triggered by $PUSHER for $SUBMODULE"
          cd "$SUBMODULE"
          git fetch origin dev
          if [ -n "$SHA" ]; then
            git checkout "$SHA"
          else
            git checkout origin/dev
          fi
          git log -1 --oneline

      # ── S2: unit tests ────────────────────────────────────────────────────────
      - name: S2 — Unit tests
        run: |
          cd "$SUBMODULE"
          if [ -d "tests" ]; then
            echo "── Running pytest ──"
            python3 -m pytest tests/ -v
          else
            echo "── No tests/ directory, skipping ──"
          fi

      # ── S3: build Docker image ────────────────────────────────────────────────
      - name: S3 — Build Docker image
        run: |
          echo "── Building $TEST_IMAGE ──"
          docker build \
            -f omni3d-container/Dockerfile \
            -t "$TEST_IMAGE" \
            .
          echo "── Build complete ──"

      # ── S4: run test container ────────────────────────────────────────────────
      - name: S4 — Start test container
        run: |
          docker rm -f "$TEST_CONTAINER" 2>/dev/null || true

          echo "── Starting $TEST_CONTAINER ──"
          docker run -d \
            --name "$TEST_CONTAINER" \
            -v /var/run/dsf:/var/run/dsf \
            -v /run/omni3d:/run/omni3d \
            -v /opt/dsf/sd/timelaps:/opt/dsf/sd/timelaps \
            -v /opt/dsf/timelaps:/opt/dsf/timelaps \
            -v /opt/omni3d/config:/app/config \
            --add-host host-gateway:host-gateway \
            --group-add 992 \
            "$TEST_IMAGE"

      # ── S5: integration test ──────────────────────────────────────────────────
      - name: S5 — Verify all services RUNNING
        run: |
          echo "── Waiting 10 seconds for services to initialise ──"
          sleep 20

          echo "── Supervisorctl status ──"
          docker exec "$TEST_CONTAINER" supervisorctl status

          FAILED=0
          while IFS= read -r line; do
            NAME=$(echo "$line" | awk '{print $1}')
            STATE=$(echo "$line" | awk '{print $2}')
            if [ "$STATE" != "RUNNING" ]; then
              echo "✗ $NAME is $STATE — expected RUNNING"
              FAILED=1
            else
              echo "✓ $NAME is RUNNING"
            fi
          done < <(docker exec "$TEST_CONTAINER" supervisorctl status)

          if [ "$FAILED" -eq 1 ]; then
            echo "── Supervisord log ──"
            docker exec "$TEST_CONTAINER" cat /var/log/supervisord.log
            echo "── template.err ──"
            docker exec "$TEST_CONTAINER" cat /var/log/template.err || true
            echo "── template.log ──"
            docker exec "$TEST_CONTAINER" cat /var/log/template.log || true
            exit 1
          fi

          echo "── All services RUNNING — pipeline passed ──"

      # ── cleanup: always runs ──────────────────────────────────────────────────
      - name: Cleanup — Remove test container
        if: always()
        run: |
          docker stop "$TEST_CONTAINER" 2>/dev/null || true
          docker rm   "$TEST_CONTAINER" 2>/dev/null || true
          docker rmi  "$TEST_IMAGE"     2>/dev/null || true
          echo "── Production container untouched ──"

      - name: Report status
        if: always()
        run: |
          echo "Build ${{ job.status }} for $SUBMODULE @ $SHA pushed by $PUSHER"
